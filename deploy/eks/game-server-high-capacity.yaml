apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig
metadata:
  name: game-server
  region: ap-northeast-2
managedNodeGroups:
  # Redis의 기존 EBS 볼륨이 ap-northeast-2c에 있으므로 인프라 노드는
  # 같은 AZ에 고정한다. 이 노드에는 gateway/redis/management/target-agent가
  # 배치되고 game-room은 배치되지 않는다.
  - name: battlegrounds-infra
    instanceTypes:
      - m6i.2xlarge
    desiredCapacity: 1
    minSize: 1
    maxSize: 1
    privateNetworking: true
    availabilityZones:
      - ap-northeast-2c
    labels:
      kyro.io/workload-role: infra
      role: target
      workload-tier: demo-fast
    nodeRepairConfig:
      enabled: true

  # 게임 룸 전용 노드. NoSchedule taint로 명시적인 toleration이 있는
  # game-room/canary-room 외 애플리케이션 파드를 차단한다. EKS CNI,
  # kube-proxy, CSI 같은 필수 시스템 DaemonSet은 예외로 모든 노드에 뜬다.
  - name: battlegrounds-game
    instanceTypes:
      - c6i.2xlarge
    desiredCapacity: 4
    minSize: 4
    maxSize: 4
    privateNetworking: true
    availabilityZones:
      - ap-northeast-2d
    labels:
      kyro.io/workload-role: game
      opsia.dev/game-pool: high-capacity
    taints:
      - key: kyro.io/workload-role
        value: game
        effect: NoSchedule
    nodeRepairConfig:
      enabled: true
