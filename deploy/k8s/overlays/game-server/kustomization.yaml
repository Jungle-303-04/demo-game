apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
  - bootstrap-secrets.yaml
labels:
  - includeSelectors: false
    pairs:
      opsia.dev/cluster-role: game-server
images:
  - name: ghcr.io/jungle-303-04/demo-game/game-server
    newTag: stable
  - name: ghcr.io/jungle-303-04/demo-game/api-server
    newTag: stable
  - name: ghcr.io/jungle-303-04/demo-game/bot-runner
    newTag: stable
  - name: ghcr.io/jungle-303-04/demo-game/ops-console
    newTag: stable
  - name: ghcr.io/jungle-303-04/demo-game/room-orchestrator
    newTag: stable
  - name: ghcr.io/jungle-303-04/demo-game/session-gateway
    newName: 183548421506.dkr.ecr.ap-northeast-2.amazonaws.com/demo-game-session-gateway
    newTag: f6ee1a672ce1e7549c8fc844dcbd7d37215c2677
patches:
  # sandbox의 모든 애플리케이션 Deployment는 기본적으로 인프라 노드에 둔다.
  # 바로 아래 game-server 패치만 게임 노드로 다시 지정된다.
  - target:
      group: apps
      version: v1
      kind: Deployment
      namespace: sandbox
    patch: |-
      - op: add
        path: /spec/template/spec/nodeSelector
        value:
          kyro.io/workload-role: infra
  - target:
      group: apps
      version: v1
      kind: Deployment
      labelSelector: app=game-server
      namespace: sandbox
    patch: |-
      - op: replace
        path: /spec/template/spec/nodeSelector
        value:
          kyro.io/workload-role: game
          opsia.dev/game-pool: high-capacity
      - op: add
        path: /spec/template/spec/tolerations
        value:
          - key: kyro.io/workload-role
            operator: Equal
            value: game
            effect: NoSchedule
  - target:
      group: apps
      version: v1
      kind: StatefulSet
      namespace: sandbox
    patch: |-
      - op: add
        path: /spec/template/spec/nodeSelector
        value:
          kyro.io/workload-role: infra
  - target:
      version: v1
      kind: ConfigMap
      name: demo-game-gateway
      namespace: sandbox
    patch: |-
      - op: replace
        path: /data/default.conf.template
        value: |
          server {
            listen 8080;
            resolver ${DNS_RESOLVER} valid=10s ipv6=off;
            client_max_body_size 1m;

            location = /healthz {
              add_header Content-Type text/plain;
              return 200 'ok';
            }

            location = /api/find-game {
              proxy_pass http://management-server.sandbox.svc.cluster.local:8081;
              proxy_set_header Host $host;
              proxy_set_header X-Forwarded-Host $host;
              proxy_set_header X-Forwarded-Proto https;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            }

            location ~ ^/(?:play|watch)/room-\d+$ {
              return 308 $uri/;
            }

            location ~ ^/(?:play|watch)/room-\d+(?:/|$) {
              proxy_pass http://session-gateway.sandbox.svc.cluster.local:8083;
              proxy_http_version 1.1;
              proxy_set_header Host $host;
              proxy_set_header Upgrade $http_upgrade;
              proxy_set_header Connection "upgrade";
              proxy_set_header X-Forwarded-Host $host;
              proxy_set_header X-Forwarded-Proto https;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_read_timeout 3600s;
              proxy_send_timeout 3600s;
              proxy_buffering off;
            }

            location / {
              proxy_pass http://management-server.sandbox.svc.cluster.local:8085;
              proxy_set_header Host $host;
              proxy_set_header X-Forwarded-Host $host;
              proxy_set_header X-Forwarded-Proto https;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            }
          }
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: demo-game-gateway
      namespace: sandbox
    patch: |-
      - op: remove
        path: /spec/template/spec/containers/0/volumeMounts/1
      - op: remove
        path: /spec/template/spec/containers/0/ports/1
      - op: remove
        path: /spec/template/spec/volumes/1
  - target:
      version: v1
      kind: Service
      name: demo-game-gateway
      namespace: sandbox
    patch: |-
      - op: remove
        path: /spec/ports/1
