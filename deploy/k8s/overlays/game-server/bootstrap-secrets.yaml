apiVersion: v1
kind: ServiceAccount
metadata:
  name: demo-game-bootstrap
  namespace: sandbox
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: demo-game-bootstrap
  namespace: sandbox
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: demo-game-bootstrap
  namespace: sandbox
subjects:
  - kind: ServiceAccount
    name: demo-game-bootstrap
    namespace: sandbox
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: demo-game-bootstrap
---
apiVersion: batch/v1
kind: Job
metadata:
  name: demo-game-bootstrap-secrets-v1
  namespace: sandbox
spec:
  backoffLimit: 4
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels: { app: demo-game-bootstrap }
    spec:
      serviceAccountName: demo-game-bootstrap
      restartPolicy: OnFailure
      containers:
        - name: kubectl
          image: bitnami/kubectl:1.31
          command: ["/bin/sh", "-ec"]
          args:
            - |
              ensure_secret() {
                name="$1"
                if kubectl -n sandbox get secret "$name" >/dev/null 2>&1; then
                  return
                fi
                token="$(head -c 48 /dev/urandom | base64 | tr -d '\n')"
                kubectl -n sandbox create secret generic "$name" --from-literal="token=$token"
              }
              ensure_secret demo-game-admin
              ensure_secret demo-game-control
          resources:
            requests: { cpu: 10m, memory: 32Mi }
            limits: { cpu: 100m, memory: 128Mi }
