apiVersion: apps/v1
kind: Deployment
metadata:
  name: management-server
  namespace: sandbox
  labels: { app: management-server, app.kubernetes.io/part-of: demo-game }
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxUnavailable: 0, maxSurge: 1 }
  selector: { matchLabels: { app: management-server } }
  template:
    metadata: { labels: { app: management-server, app.kubernetes.io/part-of: demo-game } }
    spec:
      serviceAccountName: management-server
      automountServiceAccountToken: false
      containers:
        - name: room-orchestrator
          image: ghcr.io/jungle-303-04/demo-game/room-orchestrator:stable
          imagePullPolicy: Always
          env:
            - { name: REDIS_URL, value: redis://redis:6379 }
            - { name: NAMESPACE, value: sandbox }
            - { name: GAME_DEPLOYMENT_PREFIX, value: game-room }
            - { name: MAX_ROOMS, valueFrom: { configMapKeyRef: { name: ops-policy, key: maxRooms } } }
            - { name: INITIAL_ROOMS, valueFrom: { configMapKeyRef: { name: ops-policy, key: desiredRooms } } }
            - { name: DESIRED_ROOM_PROFILES, valueFrom: { configMapKeyRef: { name: ops-policy, key: roomProfiles } } }
            - { name: GAME_ENDPOINT_TEMPLATE, value: "http://game-room-{ordinal}:8001" }
            - { name: SESSION_GATEWAY_INTERNAL_URL, value: "http://session-gateway:8083" }
            - { name: GAME_IMAGE_REPOSITORY, value: "ghcr.io/jungle-303-04/demo-game/game-server" }
            - { name: CANARY_GAME_ENDPOINT, value: "http://canary-room:8001" }
            - { name: CANARY_BOT_RUNNER_URL, value: "http://canary-validation-bot:8084" }
            - { name: REQUIRE_CANARY_APPROVAL, value: "true" }
            - name: OPSIA_EVENT_ENDPOINT
              valueFrom: { configMapKeyRef: { name: ops-policy, key: opsiaEventEndpoint } }
            - name: OPSIA_WORKSPACE_ID
              valueFrom: { configMapKeyRef: { name: ops-policy, key: opsiaWorkspaceId } }
            - name: OPSIA_CLUSTER_ID
              valueFrom: { configMapKeyRef: { name: ops-policy, key: opsiaClusterId } }
            - name: OPSIA_APPLICATION_ID
              valueFrom: { configMapKeyRef: { name: ops-policy, key: opsiaApplicationId } }
            - name: OPSIA_AGENT_TOKEN
              valueFrom: { secretKeyRef: { name: demo-game-opsia-agent, key: token, optional: true } }
            - { name: NODE_EXTRA_CA_CERTS, value: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt }
            - { name: REQUIRE_CONTROL_TOKEN, value: "true" }
            - name: OPS_CONTROL_TOKEN
              valueFrom: { secretKeyRef: { name: demo-game-control, key: token } }
          ports: [{ name: registry, containerPort: 8082 }]
          volumeMounts:
            - { name: kube-api-access, mountPath: /var/run/secrets/kubernetes.io/serviceaccount, readOnly: true }
          readinessProbe: { httpGet: { path: /healthz, port: registry }, initialDelaySeconds: 2 }
          resources: { requests: { cpu: 50m, memory: 64Mi }, limits: { cpu: 250m, memory: 256Mi } }
        - name: bot-runner
          image: ghcr.io/jungle-303-04/demo-game/bot-runner:stable
          imagePullPolicy: Always
          env:
            - { name: OPSIA_ROOM_DIRECTORY_URL, value: http://127.0.0.1:8082 }
            - { name: SESSION_GATEWAY_INTERNAL_URL, value: http://session-gateway:8083 }
            - { name: OPSIA_MIN_BOTS_PER_ROOM, value: "20" }
            - { name: OPSIA_BOT_RECONCILE_INTERVAL_MS, value: "2000" }
            - { name: OPSIA_BOT_RECONCILE_BATCH_SIZE, value: "5" }
            - { name: REQUIRE_CONTROL_TOKEN, value: "true" }
            - name: OPS_CONTROL_TOKEN
              valueFrom: { secretKeyRef: { name: demo-game-control, key: token } }
          ports: [{ name: bots, containerPort: 8084 }]
          readinessProbe: { httpGet: { path: /healthz, port: bots }, initialDelaySeconds: 2 }
          resources: { requests: { cpu: 500m, memory: 512Mi }, limits: { cpu: "2", memory: 2Gi } }
        - name: ops-console
          image: ghcr.io/jungle-303-04/demo-game/ops-console:stable
          imagePullPolicy: Always
          env:
            - { name: ORCHESTRATOR_URL, value: http://127.0.0.1:8082 }
            - { name: BOT_RUNNER_URL, value: http://127.0.0.1:8084 }
            - { name: API_SERVER_URL, value: http://api-server:8081 }
            - { name: REQUIRE_CONTROL_TOKEN, value: "true" }
            - name: OPS_CONTROL_TOKEN
              valueFrom: { secretKeyRef: { name: demo-game-control, key: token } }
          ports: [{ name: console, containerPort: 8085 }]
          readinessProbe: { httpGet: { path: /healthz, port: console }, initialDelaySeconds: 2 }
          resources: { requests: { cpu: 250m, memory: 256Mi }, limits: { cpu: "1", memory: 1Gi } }
      volumes:
        - name: kube-api-access
          projected:
            defaultMode: 420
            sources:
              - serviceAccountToken: { path: token, expirationSeconds: 3600 }
              - configMap:
                  name: kube-root-ca.crt
                  items: [{ key: ca.crt, path: ca.crt }]
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata: { name: management-server, namespace: sandbox }
spec:
  minAvailable: 1
  selector: { matchLabels: { app: management-server } }
---
apiVersion: v1
kind: Service
metadata: { name: management-server, namespace: sandbox, labels: { app: management-server } }
spec:
  selector: { app: management-server }
  ports:
    - { name: registry, port: 8082, targetPort: registry }
    - { name: console, port: 8085, targetPort: console }
