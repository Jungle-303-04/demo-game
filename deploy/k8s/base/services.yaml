apiVersion: v1
kind: Service
metadata:
  name: game-headless
  namespace: sandbox
  labels: { app: game-server }
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector: { app: game-server }
  ports: [{ name: http, port: 8080, targetPort: http }]
---
apiVersion: v1
kind: Service
metadata:
  name: game-metrics
  namespace: sandbox
  labels: { app: game-server }
spec:
  selector: { app: game-server }
  ports: [{ name: http, port: 8080, targetPort: http }]

