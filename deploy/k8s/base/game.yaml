apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: game
  namespace: sandbox
  labels: { app: game-server, app.kubernetes.io/part-of: demo-game }
spec:
  serviceName: game-headless
  replicas: 3
  podManagementPolicy: Parallel
  updateStrategy: { type: RollingUpdate }
  selector:
    matchLabels: { app: game-server }
  template:
    metadata:
      labels: { app: game-server, app.kubernetes.io/part-of: demo-game }
    spec:
      terminationGracePeriodSeconds: 30
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector: { matchLabels: { app: game-server } }
      containers:
        - name: game-server
          image: ghcr.io/jungle-303-04/demo-game/game-server:stable
          imagePullPolicy: Always
          command:
            - sh
            - -ec
            - |
              ordinal="${HOSTNAME##*-}"
              case "${ordinal}" in
                0) export OPSIA_MAP_NAME=faction ;;
                1) export OPSIA_MAP_NAME=desert ;;
                2) export OPSIA_MAP_NAME=snow ;;
                *) echo "unsupported game pod ordinal: ${ordinal}" >&2; exit 1 ;;
              esac
              export ROOM_ID="room-${ordinal}"
              export POD_NAME="${HOSTNAME}"
              exec node --enable-source-maps dist/gameServer.js
          env:
            - { name: REDIS_URL, value: redis://redis:6379 }
            - { name: POD_NAME, valueFrom: { fieldRef: { fieldPath: metadata.name } } }
            - { name: STRICT_MODE, value: "false" }
            - { name: OPSIA_ROOM, value: "true" }
            - { name: OPSIA_INFINITE, value: "true" }
            - { name: SURVEV_CLIENT_DIR, value: /app/upstream-survev/client/dist }
            - { name: REQUIRE_CONTROL_TOKEN, value: "true" }
            - name: OPS_CONTROL_TOKEN
              valueFrom: { secretKeyRef: { name: demo-game-control, key: token } }
          ports: [{ containerPort: 8001, name: http }]
          resources:
            requests: { cpu: 500m, memory: 1Gi }
            limits: { cpu: "1500m", memory: 2Gi }
          readinessProbe: { httpGet: { path: /healthz, port: http }, initialDelaySeconds: 5, periodSeconds: 2, failureThreshold: 30 }
          livenessProbe: { httpGet: { path: /healthz, port: http }, initialDelaySeconds: 30, periodSeconds: 10 }
