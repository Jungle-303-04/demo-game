apiVersion: apps/v1
kind: Deployment
metadata:
  name: game-room-0
  namespace: sandbox
  labels:
    app: game-server
    app.kubernetes.io/part-of: demo-game
    opsia.dev/fleet: live
    opsia.dev/room-id: room-0
    game.opsia.dev/room-id: room-0
    opsia.dev/room-profile: faction
    opsia.dev/rollout-role: active-candidate
    opsia.dev/game-role: active
    opsia.dev/recovery-continuity: protected
spec:
  replicas: 1
  minReadySeconds: 15
  strategy: { type: RollingUpdate, rollingUpdate: { maxSurge: 1, maxUnavailable: 0 } }
  selector: { matchLabels: { app: game-server, opsia.dev/room-id: room-0 } }
  template:
    metadata:
      labels:
        app: game-server
        app.kubernetes.io/part-of: demo-game
        opsia.dev/fleet: live
        opsia.dev/room-id: room-0
        game.opsia.dev/room-id: room-0
        opsia.dev/room-profile: faction
        opsia.dev/rollout-role: active-candidate
        opsia.dev/game-role: active
        opsia.dev/recovery-continuity: protected
      annotations:
        opsia.dev/room-epoch: "1"
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8001"
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        -
          name: game-server
          image: ghcr.io/jungle-303-04/demo-game/game-server:stable
          imagePullPolicy: Always
          env:
            - { name: ROOM_ID, value: room-0 }
            - { name: OPSIA_MAP_NAME, value: faction }
            - { name: OPSIA_ROOM_PROFILE, value: faction }
            - { name: OPSIA_HANDOFF_ROLE, value: active-candidate }
            - { name: OPSIA_ROLE, value: auto }
            - { name: OPSIA_GAME_BUILD_REVISION, value: stable }
            - { name: ROOM_EPOCH, value: "1" }
            - { name: OPSIA_WORKLOAD_NAME, value: game-room-0 }
            - { name: OPSIA_RESOURCE_KIND, value: Deployment }
            - name: OPSIA_CONTINUITY_ID
              valueFrom: { fieldRef: { fieldPath: "metadata.labels['game.opsia.dev/room-id']" } }
            - { name: REDIS_URL, value: redis://cache:6379/0 }
            - { name: POD_NAME, valueFrom: { fieldRef: { fieldPath: metadata.name } } }
            - { name: POD_NAMESPACE, valueFrom: { fieldRef: { fieldPath: metadata.namespace } } }
            - { name: POD_UID, valueFrom: { fieldRef: { fieldPath: metadata.uid } } }
            - { name: STRICT_MODE, value: "false" }
            - { name: OPSIA_ROOM, value: "true" }
            - { name: OPSIA_BOT_STARTER_GUNS, value: "mp5,mac10,vector,hk416,ak47,scar,mosin,m870,m9" }
            - { name: OPSIA_INFINITE, value: "true" }
            - { name: SURVEV_CLIENT_DIR, value: /app/upstream-survev/client/dist }
            - { name: REQUIRE_SESSION_GATEWAY, value: "true" }
            - name: SESSION_GATEWAY_SHARED_SECRET
              valueFrom: { secretKeyRef: { name: demo-game-session-gateway, key: shared-secret } }
            - { name: REQUIRE_CONTROL_TOKEN, value: "true" }
            - name: OPS_CONTROL_TOKEN
              valueFrom: { secretKeyRef: { name: demo-game-control, key: token } }
          ports: [{ containerPort: 8001, name: http }]
          resources:
            requests: { cpu: "1", memory: 2Gi }
            limits: { cpu: "3", memory: 4Gi }
          readinessProbe: { httpGet: { path: /healthz, port: http }, initialDelaySeconds: 5, periodSeconds: 2, failureThreshold: 30 }
          livenessProbe: { httpGet: { path: /health, port: http }, initialDelaySeconds: 30, periodSeconds: 10 }
---
