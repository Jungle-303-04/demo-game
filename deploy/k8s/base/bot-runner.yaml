apiVersion: apps/v1
kind: Deployment
metadata: { name: bot-runner, namespace: sandbox }
spec:
  replicas: 1
  selector: { matchLabels: { app: bot-runner } }
  template:
    metadata: { labels: { app: bot-runner, app.kubernetes.io/part-of: demo-game } }
    spec:
      containers:
        - name: bot-runner
          image: ghcr.io/jungle-303-04/demo-game/bot-runner:stable
          env:
            - { name: OPSIA_ROOM_ENDPOINTS, value: "room-0=http://game-0.game-headless.sandbox.svc.cluster.local:8001,room-1=http://game-1.game-headless.sandbox.svc.cluster.local:8001,room-2=http://game-2.game-headless.sandbox.svc.cluster.local:8001" }
          ports: [{ name: http, containerPort: 8084 }]
---
apiVersion: v1
kind: Service
metadata: { name: bot-runner, namespace: sandbox }
spec:
  selector: { app: bot-runner }
  ports: [{ name: http, port: 8084, targetPort: http }]
