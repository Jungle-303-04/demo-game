apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: sandbox
spec:
  # StatefulSet identity is immutable and remains independent from the
  # client-facing Service name below.
  serviceName: redis
  replicas: 1
  persistentVolumeClaimRetentionPolicy: { whenDeleted: Retain, whenScaled: Retain }
  selector:
    matchLabels: { app: redis }
  template:
    metadata:
      labels: { app: redis }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["--appendonly", "yes"]
          ports: [{ containerPort: 6379, name: redis }]
          readinessProbe: { exec: { command: ["redis-cli", "ping"] }, initialDelaySeconds: 2 }
          volumeMounts: [{ name: data, mountPath: /data }]
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: gp2
        resources: { requests: { storage: 2Gi } }
---
apiVersion: v1
kind: Service
metadata:
  name: cache
  namespace: sandbox
spec:
  selector: { app: redis }
  ports: [{ name: redis, port: 6379, targetPort: redis }]
