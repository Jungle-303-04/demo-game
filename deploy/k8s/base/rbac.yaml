apiVersion: v1
kind: ServiceAccount
metadata: { name: room-orchestrator, namespace: sandbox }
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata: { name: room-orchestrator, namespace: sandbox }
rules:
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    resourceNames: ["game"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata: { name: room-orchestrator, namespace: sandbox }
subjects: [{ kind: ServiceAccount, name: room-orchestrator, namespace: sandbox }]
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: Role, name: room-orchestrator }

