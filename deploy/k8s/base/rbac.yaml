apiVersion: v1
kind: ServiceAccount
metadata: { name: management-server, namespace: sandbox }
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata: { name: management-server, namespace: sandbox }
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames: ["game-room-0", "game-room-1", "game-room-2", "game-room-3", "game-room-4", "canary-room"]
    verbs: ["get", "patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata: { name: room-orchestrator, namespace: sandbox }
subjects: [{ kind: ServiceAccount, name: management-server, namespace: sandbox }]
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: Role, name: management-server }
