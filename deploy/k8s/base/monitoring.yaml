apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata: { name: demo-game, namespace: sandbox }
spec:
  selector:
    matchExpressions:
      - key: app
        operator: In
        values: [game-server, api-server]
  endpoints: [{ port: http, path: /metrics, interval: 15s }]
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata: { name: demo-game-alerts, namespace: sandbox }
spec:
  groups:
    - name: demo-game.alerts
      rules:
        - alert: DemoGameTickOverrun
          expr: histogram_quantile(0.95, sum(rate(tick_duration_ms_bucket[1m])) by (le, room)) > 40
          for: 30s
          labels: { severity: warning, service: game-server }
          annotations: { summary: "game tick p95 is over the live-demo budget" }
        - alert: DemoGameInputFlood
          expr: sum(rate(player_input_rate_total{outcome="rejected"}[1m])) by (room) > 20
          for: 20s
          labels: { severity: warning, service: game-server }
          annotations: { summary: "rejected game input is elevated" }
        - alert: DemoGameJoinStorm
          expr: find_game_fail_ratio > 0.2
          for: 20s
          labels: { severity: warning, service: api-server }
          annotations: { summary: "matchmaking rejections are elevated" }

