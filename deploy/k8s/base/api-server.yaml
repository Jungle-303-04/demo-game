apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-server
  namespace: sandbox
spec:
  replicas: 2
  selector: { matchLabels: { app: api-server } }
  template:
    metadata: { labels: { app: api-server, app.kubernetes.io/part-of: demo-game } }
    spec:
      containers:
        - name: api-server
          image: ghcr.io/jungle-303-04/demo-game/api-server:stable
          env: [{ name: ORCHESTRATOR_URL, value: http://room-orchestrator:8082 }]
          ports: [{ name: http, containerPort: 8081 }]
          readinessProbe: { httpGet: { path: /healthz, port: http }, initialDelaySeconds: 2 }
---
apiVersion: v1
kind: Service
metadata: { name: api-server, namespace: sandbox, labels: { app: api-server } }
spec:
  selector: { app: api-server }
  ports: [{ name: http, port: 8081, targetPort: http }]

