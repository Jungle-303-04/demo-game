apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-server
  namespace: sandbox
spec:
  # Keep the approved pre-release admission capacity as the GitOps baseline.
  replicas: 10
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxUnavailable: 0, maxSurge: 1 }
  selector: { matchLabels: { app: api-server } }
  template:
    metadata:
      labels:
        app: api-server
        app.kubernetes.io/part-of: demo-game
        opsia.dev/service: api-server
        opsia.dev/sli: admission
        opsia.dev/symptom: admission_failure
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8081"
    spec:
      containers:
        - name: api-server
          image: ghcr.io/jungle-303-04/demo-game/api-server:stable
          imagePullPolicy: Always
          env:
            - { name: ORCHESTRATOR_URL, value: http://login-gateway-management:8082 }
            - { name: MAX_FIND_GAME_PER_SECOND, value: "25" }
            - { name: POD_NAMESPACE, valueFrom: { fieldRef: { fieldPath: metadata.namespace } } }
            - { name: OPSIA_RESOURCE_KIND, value: "Deployment" }
            - name: OPSIA_WORKLOAD_NAME
              valueFrom: { fieldRef: { fieldPath: "metadata.labels['app']" } }
            - name: OPSIA_SERVICE_NAME
              valueFrom: { fieldRef: { fieldPath: "metadata.labels['opsia.dev/service']" } }
            - name: OPSIA_SLI_NAME
              valueFrom: { fieldRef: { fieldPath: "metadata.labels['opsia.dev/sli']" } }
            - name: OPSIA_SLI_SYMPTOM
              valueFrom: { fieldRef: { fieldPath: "metadata.labels['opsia.dev/symptom']" } }
            - { name: REQUIRE_CONTROL_TOKEN, value: "true" }
            - name: OPS_CONTROL_TOKEN
              valueFrom: { secretKeyRef: { name: demo-game-control, key: token } }
          ports: [{ name: http, containerPort: 8081 }]
          readinessProbe: { httpGet: { path: /healthz, port: http }, initialDelaySeconds: 2 }
          resources: { requests: { cpu: 50m, memory: 64Mi }, limits: { cpu: 250m, memory: 256Mi } }
---
apiVersion: v1
kind: Service
metadata: { name: login-gateway-api, namespace: sandbox, labels: { app: api-server } }
spec:
  publishNotReadyAddresses: true
  selector: { app: api-server }
  ports: [{ name: http, port: 8081, targetPort: http }]
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata: { name: api-server, namespace: sandbox }
spec:
  minAvailable: 3
  selector: { matchLabels: { app: api-server } }
