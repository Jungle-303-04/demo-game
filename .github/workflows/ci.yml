name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - uses: pnpm/action-setup@v4
        with: { version: 11.8.0 }
      - run: npm ci
      - run: pnpm --dir upstream-survev install --frozen-lockfile
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test
      - uses: azure/setup-kubectl@v4
      - run: kubectl kustomize deploy/k8s/overlays/sandbox >/dev/null
      - run: kubectl kustomize deploy/k8s/overlays/game-server >/dev/null
