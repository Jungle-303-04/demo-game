name: Publish demo images

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: game-server
            dockerfile: services/game-server/Dockerfile
          - image: api-server
            dockerfile: services/api-server/Dockerfile
          - image: bot-runner
            dockerfile: services/bot-runner/Dockerfile
          - image: ops-console
            dockerfile: services/ops-console/Dockerfile
          - image: room-orchestrator
            dockerfile: services/room-orchestrator/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ghcr.io/jungle-303-04/demo-game/${{ matrix.image }}:v20260720-pip-ai-1
          labels: org.opencontainers.image.source=https://github.com/${{ github.repository }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
