x-control-environment: &control-environment
  REQUIRE_CONTROL_TOKEN: "true"
  OPS_CONTROL_TOKEN: "${OPS_CONTROL_TOKEN:-demo-game-local-control-token}"
  OPSIA_SNAPSHOT_INTERVAL_MS: "${OPSIA_SNAPSHOT_INTERVAL_MS:-5000}"
  OPSIA_BOT_STARTER_GUNS: "${OPSIA_BOT_STARTER_GUNS:-mp5,mac10,vector,hk416,ak47,scar,mosin,m870,m9}"
x-session-gateway-environment: &session-gateway-environment
  SESSION_GATEWAY_SHARED_SECRET: "${SESSION_GATEWAY_SHARED_SECRET:-demo-game-local-gateway-secret-change-me-32-bytes}"

services:
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 15

  game-0:
    build: { context: ., dockerfile: services/game-server/Dockerfile }
    environment:
      <<: [*control-environment, *session-gateway-environment]
      REQUIRE_SESSION_GATEWAY: "true"
      ROOM_ID: room-0
      ROOM_EPOCH: "1"
      OPSIA_MAP_NAME: faction
      POD_NAME: game-0
      REDIS_URL: redis://redis:6379
      PUBLIC_BASE_URL: "http://${PUBLIC_GAME_HOST:-localhost}:8083"
    ports: ["127.0.0.1:8090:8001"]
    depends_on: { redis: { condition: service_healthy } }
  game-1:
    build: { context: ., dockerfile: services/game-server/Dockerfile }
    environment:
      <<: [*control-environment, *session-gateway-environment]
      REQUIRE_SESSION_GATEWAY: "true"
      ROOM_ID: room-1
      ROOM_EPOCH: "1"
      OPSIA_MAP_NAME: desert
      POD_NAME: game-1
      REDIS_URL: redis://redis:6379
      PUBLIC_BASE_URL: "http://${PUBLIC_GAME_HOST:-localhost}:8083"
    ports: ["127.0.0.1:8091:8001"]
    depends_on: { redis: { condition: service_healthy } }
  game-2:
    build: { context: ., dockerfile: services/game-server/Dockerfile }
    environment:
      <<: [*control-environment, *session-gateway-environment]
      REQUIRE_SESSION_GATEWAY: "true"
      ROOM_ID: room-2
      ROOM_EPOCH: "1"
      OPSIA_MAP_NAME: snow
      POD_NAME: game-2
      REDIS_URL: redis://redis:6379
      PUBLIC_BASE_URL: "http://${PUBLIC_GAME_HOST:-localhost}:8083"
    ports: ["127.0.0.1:8092:8001"]
    depends_on: { redis: { condition: service_healthy } }
  game-3:
    build: { context: ., dockerfile: services/game-server/Dockerfile }
    environment:
      <<: [*control-environment, *session-gateway-environment]
      REQUIRE_SESSION_GATEWAY: "true"
      ROOM_ID: room-3
      ROOM_EPOCH: "1"
      OPSIA_MAP_NAME: main
      POD_NAME: game-3
      REDIS_URL: redis://redis:6379
      PUBLIC_BASE_URL: "http://${PUBLIC_GAME_HOST:-localhost}:8083"
    ports: ["127.0.0.1:8093:8001"]
    depends_on: { redis: { condition: service_healthy } }
  game-4:
    build: { context: ., dockerfile: services/game-server/Dockerfile }
    environment:
      <<: [*control-environment, *session-gateway-environment]
      REQUIRE_SESSION_GATEWAY: "true"
      ROOM_ID: room-4
      ROOM_EPOCH: "1"
      OPSIA_MAP_NAME: woods
      POD_NAME: game-4
      REDIS_URL: redis://redis:6379
      PUBLIC_BASE_URL: "http://${PUBLIC_GAME_HOST:-localhost}:8083"
    ports: ["127.0.0.1:8094:8001"]
    depends_on: { redis: { condition: service_healthy } }

  room-orchestrator:
    build: { context: ., dockerfile: services/room-orchestrator/Dockerfile }
    environment:
      <<: *control-environment
      REDIS_URL: redis://redis:6379
      MAX_ROOMS: "5"
      INITIAL_ROOMS: "5"
      GAME_ENDPOINT_TEMPLATE: "http://game-{ordinal}:8001"
      GAME_WORKLOAD_NAME_TEMPLATE: "game-{ordinal}"
      SESSION_GATEWAY_INTERNAL_URL: http://session-gateway:8083
      REQUIRE_CANARY_APPROVAL: "false"
      OPSIA_EVENT_ENDPOINT: "${OPSIA_EVENT_ENDPOINT:-}"
      OPSIA_AGENT_TOKEN: "${OPSIA_AGENT_TOKEN:-}"
      OPSIA_WORKSPACE_ID: "${OPSIA_WORKSPACE_ID:-demo-game}"
      OPSIA_CLUSTER_ID: "${OPSIA_CLUSTER_ID:-game-server}"
      OPSIA_APPLICATION_ID: "${OPSIA_APPLICATION_ID:-demo-game}"
    depends_on: { redis: { condition: service_healthy }, game-0: { condition: service_started }, game-1: { condition: service_started }, game-2: { condition: service_started }, game-3: { condition: service_started }, game-4: { condition: service_started } }
  session-gateway:
    build: { context: ., dockerfile: services/session-gateway/Dockerfile }
    environment:
      <<: [*control-environment, *session-gateway-environment]
      SESSION_ROOM_ENDPOINTS: "room-0=http://game-0:8001,room-1=http://game-1:8001,room-2=http://game-2:8001,room-3=http://game-3:8001,room-4=http://game-4:8001"
      ADMISSION_GATEWAY_URL: http://api-server:8081
      REQUIRE_ADMISSION_GATEWAY: "true"
    ports: ["8083:8083"]
    depends_on: { game-0: { condition: service_started }, game-1: { condition: service_started }, game-2: { condition: service_started }, game-3: { condition: service_started }, game-4: { condition: service_started } }
  api-server:
    build: { context: ., dockerfile: services/api-server/Dockerfile }
    restart: on-failure
    environment:
      <<: *control-environment
      ORCHESTRATOR_URL: http://room-orchestrator:8082
      ADMISSION_OVERLOAD_THRESHOLD_REQUESTS: "${ADMISSION_OVERLOAD_THRESHOLD_REQUESTS:-35}"
      ADMISSION_OVERLOAD_WINDOW_MS: "${ADMISSION_OVERLOAD_WINDOW_MS:-1000}"
      ADMISSION_OVERLOAD_EXIT_CODE: "${ADMISSION_OVERLOAD_EXIT_CODE:-70}"
      ADMISSION_FAILURE_STATE_FILE: /tmp/opsia-admission-overload.failed
      PUBLIC_ROOM_URLS: "room-0=http://${PUBLIC_GAME_HOST:-localhost}:8083/play/room-0/,room-1=http://${PUBLIC_GAME_HOST:-localhost}:8083/play/room-1/,room-2=http://${PUBLIC_GAME_HOST:-localhost}:8083/play/room-2/,room-3=http://${PUBLIC_GAME_HOST:-localhost}:8083/play/room-3/,room-4=http://${PUBLIC_GAME_HOST:-localhost}:8083/play/room-4/"
    ports: ["8081:8081"]
    depends_on: { room-orchestrator: { condition: service_started } }
  bot-runner:
    build: { context: ., dockerfile: services/bot-runner/Dockerfile }
    environment:
      <<: *control-environment
      OPSIA_ROOM_DIRECTORY_URL: http://room-orchestrator:8082
      SESSION_GATEWAY_INTERNAL_URL: http://session-gateway:8083
      OPSIA_MIN_BOTS_PER_ROOM: "${OPSIA_MIN_BOTS_PER_ROOM:-1}"
      OPSIA_BOT_TACTICAL_BRAIN: "${OPSIA_BOT_TACTICAL_BRAIN:-false}"
      OPSIA_BOT_LIGHTWEIGHT_COMBAT: "${OPSIA_BOT_LIGHTWEIGHT_COMBAT:-true}"
    ports: ["8084:8084"]
    depends_on: { room-orchestrator: { condition: service_started }, session-gateway: { condition: service_started } }
  ops-console:
    build: { context: ., dockerfile: services/ops-console/Dockerfile }
    environment:
      <<: *control-environment
      ORCHESTRATOR_URL: http://room-orchestrator:8082
      BOT_RUNNER_URL: http://bot-runner:8084
      SESSION_GATEWAY_INTERNAL_URL: http://session-gateway:8083
      PUBLIC_ROOM_URLS: "room-0=http://${PUBLIC_GAME_HOST:-localhost}:8083/play/room-0/,room-1=http://${PUBLIC_GAME_HOST:-localhost}:8083/play/room-1/,room-2=http://${PUBLIC_GAME_HOST:-localhost}:8083/play/room-2/,room-3=http://${PUBLIC_GAME_HOST:-localhost}:8083/play/room-3/,room-4=http://${PUBLIC_GAME_HOST:-localhost}:8083/play/room-4/"
    ports: ["8085:8085"]
    depends_on: { room-orchestrator: { condition: service_started }, bot-runner: { condition: service_started } }
